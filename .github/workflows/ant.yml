name: Java CI with Ant (JDK 8, Tomcat 9, NetBeans CopyLibs)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Download NetBeans CopyLibs
      run: |
        mkdir -p ./lib-extra
        wget https://github.com/apache/netbeans/raw/rel-nb82/netbeans/java/ant/extra/org-netbeans-modules-java-j2seproject-copylibstask.jar \
          -O ./lib-extra/org-netbeans-modules-java-j2seproject-copylibstask.jar

    - name: Patch CopyLibs path in project.properties
      run: |
        echo "libs.CopyLibs.classpath=$GITHUB_WORKSPACE/lib-extra/org-netbeans-modules-java-j2seproject-copylibstask.jar" >> AutoWashPro-Website/nbproject/project.properties

    - name: Build with Ant
      run: ant -f AutoWashPro-Website/build.xml

    # Optional: Archive WAR artifact if you want to download after build
    - name: Archive WAR file
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: war
        path: AutoWashPro-Website/dist/*.war
